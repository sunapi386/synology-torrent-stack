version: "3.8"

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - ${WEBUI_PORT:-8080}:8080   # qBittorrent Web UI
      - 6881:6881                   # Torrent port
      - 6881:6881/udp
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER:-surfshark}
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-10.14.0.2/16}
      - SERVER_CITIES=${SERVER_CITY:-San Jose}
      - TZ=${TZ:-America/Los_Angeles}
    volumes:
      - ./gluetun:/gluetun
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Los_Angeles}
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent-config:/config
      - ${DOWNLOAD_DIR:-/volume1/public-media/Downloads}:/downloads
    restart: unless-stopped
